{% extends "base.html" %}

{% block title %}Профиль{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="bi bi-person-circle me-2"></i>Профиль пользователя</h4>
            </div>
            <div class="card-body text-center py-4">

                <div class="display-1 text-primary mb-3">
                    {{ user[0]|upper }}
                </div>

                <h2 class="card-title fw-bold">{{ user }}</h2>
                <p> Ваш личный кабинет</p>

                <div class="row text-center mb-4">
                    <div class="col-6 border-end">
                        <div class="h4 text-primary mb-0">0</div>
                        <small class="text-muted">Решено заданий</small>
                    </div>
                    <div class="col-6">
                        <div class="h4 text-success mb-0">0%</div>
                        <small class="text-muted">Процент верно решенных задач</small>
                    </div>
                </div>

                <hr>

                <div class="d-grid gap-2">
                    <a href="/task" class="btn btn-success btn-lg">
                        Задания по информатике
                    </a>
                    <a href="/task/math" class="btn btn-info btn-lg text-white">
                        Задания по математике
                    </a>
                    <a href="/" class="btn btn-outline-secondary">
                        На главную
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
