<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        .navbar { background: #333; padding: 15px 20px; display: flex; justify-content: space-between; }
        .navbar a { color: white; text-decoration: none; padding: 10px 15px; border-radius: 4px; }
        .navbar a:hover { background: #555; }
        .container { max-width: 600px; margin: 50px auto; padding: 35px; background: white; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,0.1); text-align: center; }
        .avatar { width: 100px; height: 100px; background: linear-gradient(135deg, #3498db, #2980b9); border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; font-weight: bold; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3); }
        h1 { color: #333; margin: 10px 0; }
        .info { color: #666; margin: 20px 0; line-height: 1.6; }
        .btn { display: inline-block; padding: 12px 30px; background: #c0392b; color: white; text-decoration: none; border-radius: 4px; transition: 0.3s; margin: 5px; }
        .btn:hover { background: #a93226; }
        .btn-blue { background: #3498db; }
        .btn-blue:hover { background: #2980b9; }
        .btn-green { background: #27ae60; }
        .btn-green:hover { background: #219a52; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/">Главная</a>
        <div>
            <a href="/task">Задания</a>
            <a href="/logout" style="background:#c0392b;">↪ Выйти</a>
        </div>
    </nav>

    <div class="container">
        <div class="avatar">{{ user[0]|upper }}</div>
        <h1>Профиль пользователя</h1>
        <p class="info">Привет, <b>{{ user }} Здесь будет показана ваша успеваемость</b>! 👋</p>
        <p class="info">Это ваша личная страница. Здесь вы можете отслеживать свой прогресс и управлять аккаунтом.</p>
        <div style="margin-top: 30px;">
            <a href="/task" class="btn btn-green">Подготовка к ОГЭ по информатике</a>
            <a href="/" class="btn btn-blue">На главную страницу</a>
            <a href="/logout" class="btn">↪ Выйти</a>
        </div>
    </div>
</body>
</html>
</body>
</html>
